name: Bug report
description: Something behaves incorrectly or inconsistently
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to file a report. Please fill in what you can —
        a clear repro is the single most useful thing.
  - type: textarea
    id: what
    attributes:
      label: What happened
      description: The incorrect behaviour you observed.
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: What you expected
    validations:
      required: true
  - type: textarea
    id: repro
    attributes:
      label: Steps to reproduce
      description: Commands, inputs, matrix sizes, seeds — anything needed to hit it.
      placeholder: |
        1. cargo run --example ...
        2. with matrix size ... and seed ...
        3. observe ...
    validations:
      required: true
  - type: input
    id: commit
    attributes:
      label: Commit / version
      description: Output of `git rev-parse --short HEAD`.
    validations:
      required: false
  - type: input
    id: toolchain
    attributes:
      label: Rust toolchain
      description: Output of `rustc --version`.
    validations:
      required: false
